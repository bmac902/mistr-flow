document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eY(0); } 30%,60% { transform: translateY(-2px); } }\n  @keyframes flo-exit { 0%,12% { transform: translateX(0); opacity: 1; } 46% { transform: translateX(-58px); opacity: 0; } 60%,88% { transform: translateX(-58px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }\n  @keyframes flo-blink { 0%,94%,100% { transform: scaleY(1); } 97% { transform: scaleY(.1); } }\n  @keyframes flo-spark { 0%,100% { opacity: 0; transform: scale(.6); } 50% { opacity: 1; transform: scale(1); } }\n  @keyframes flo-flick { 0%,16% { transform: rotate(0); } 40% { transform: rotate(-22deg); } 60% { transform: rotate(-22deg); } 82%,100% { transform: rotate(0); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'Space Grotesk', sans-serif; color: #2A241F; max-width: 1400px; margin: 0 auto; padding: 56px 48px 80px;\">\n\n  <!-- ===== HEADER ===== -->\n  <header style=\"display: flex; justify-content: space-between; align-items: flex-end; gap: 40px; border-bottom: 1.5px solid #2A241F; padding-bottom: 28px;\">\n    <div style=\"max-width: 720px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: #9A7B3C; margin-bottom: 18px;\">Motion &amp; Design Storyboard · v1<\u002Fdiv>\n      <h1 style=\"font-family: 'Playfair Display', serif; font-weight: 800; font-size: 76px; line-height: 0.92; margin: 0 0 14px; letter-spacing: -0.01em;\">Mistr Flow<\u002Fh1>\n      <p style=\"font-family: 'Playfair Display', serif; font-style: italic; font-size: 24px; color: #6B5E4C; margin: 0 0 20px;\">\"Dictate messy. Paste clean.\"<\u002Fp>\n      <p style=\"font-size: 15.5px; line-height: 1.55; color: #4A4136; max-width: 600px; margin: 0;\">A tiny gentleman who tidies your rambling. Press a hotkey, speak messy, an LLM tidies it, paste clean. No voice control, no command grammar, no SaaS bloat — just a vaudeville butler for your words.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex: none; width: 268px; border: 1.5px solid #C8A14A; background: #F8F1E1; padding: 18px 20px; border-radius: 3px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: #9A7B3C; margin-bottom: 10px;\">Governing principle<\u002Fdiv>\n      <p style=\"font-size: 14px; line-height: 1.5; margin: 0; color: #2A241F;\">The joke makes the tool lovable, but it must <strong>never<\u002Fstrong> slow the user down. The mascot is delightful seasoning — not the meal.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== TOKENS ===== -->\n  <section style=\"display: flex; gap: 48px; flex-wrap: wrap; padding: 30px 0 38px; border-bottom: 1px solid #D8CBB0;\">\n    <div>\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #9A7B3C; margin-bottom: 14px;\">Palette<\u002Fdiv>\n      <div style=\"display: flex; gap: 10px;\">\n        <div style=\"text-align: center;\"><div style=\"width: 52px; height: 52px; border-radius: 4px; background: #EBE1CD; border: 1px solid #D8CBB0;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 6px;\">cream<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align: center;\"><div style=\"width: 52px; height: 52px; border-radius: 4px; background: #221D19;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 6px;\">stage<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align: center;\"><div style=\"width: 52px; height: 52px; border-radius: 4px; background: #2A241F;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 6px;\">ink<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align: center;\"><div style=\"width: 52px; height: 52px; border-radius: 4px; background: #6B5E4C;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 6px;\">charcoal<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align: center;\"><div style=\"width: 52px; height: 52px; border-radius: 4px; background: #B8893C;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 6px;\">brass<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align: center;\"><div style=\"width: 52px; height: 52px; border-radius: 4px; background: #F4ECD9; border: 1px solid #D8CBB0;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 6px;\">warm wht<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #9A7B3C; margin-bottom: 14px;\">Type<\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n        <div style=\"font-family: 'Playfair Display', serif; font-weight: 800; font-size: 22px; line-height: 1;\">Playfair Display <span style=\"font-family:'Space Mono',monospace; font-size: 10px; color: #9A7B3C; font-weight: 400;\">— brand &amp; state names<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 17px;\">Space Grotesk <span style=\"font-family:'Space Mono',monospace; font-size: 10px; color: #9A7B3C;\">— UI &amp; status copy<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 14px;\">Space Mono <span style=\"font-size: 10px; color: #9A7B3C;\">— timing &amp; spec annotations<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CHARACTER SHEET ===== -->\n  <section style=\"display: flex; gap: 44px; align-items: center; padding: 44px 0 50px;\">\n    <div style=\"flex: none; width: 360px; background: radial-gradient(ellipse 60% 55% at 50% 42%, #38302700 0%, #2A241F00 60%); position: relative;\">\n      <div style=\"backgrou         <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #9A7B3C; margin-bottom: 12px;\">The Gentleman<\u002Fdiv>\n      <h2 style=\"font-family: 'Playfair Display', serif; font-weight: 700; font-size: 32px; margin: 0 0 16px; line-height: 1.05;\">One mascot, eight poses.<\u002Fh2>\n      <p style=\"font-size: 15px; line-height: 1.6; color: #4A4136; max-width: 560px; margin: 0 0 22px;\">Built from circles, ellipses and two little curves so he stays consistent across every state and still reads at 16&nbsp;px in the tray. Excessive dignity for such a small utility.<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 24px; max-width: 580px;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size: 12px;\"><span style=\"color: #B8893C;\">●<\u002Fspan> Top hat <span style=\"color:#9A7B3C;\">— tips, pops off<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 12px;\"><span style=\"color: #B8893C;\">●<\u002Fspan> Moustache <span style=\"color:#9A7B3C;\">— wiggles<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 12px;\"><span style=\"color: #B8893C;\">●<\u002Fspan> Cane <span style=\"color:#9A7B3C;\">— twirls<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 12px;\"><span style=\"color: #B8893C;\">●<\u002Fspan> Gloved hand <span style=\"color:#9A7B3C;\">— brushes<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 12px;\"><span style=\"color: #B8893C;\">●<\u002Fspan> Brass bowtie<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 12px;\"><span style=\"color: #B8893C;\">●<\u002Fspan> Ribbon mic <span style=\"color:#9A7B3C;\">— his stage<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 24px; font-family:'Space Mono',monospace; font-size: 11.5px; color: #6B5E4C; background: #F3EAD6; border-left: 3px solid #B8893C; padding: 11px 14px; border-radius: 2px; max-width: 560px;\">Note — animations <strong>loop here for preview<\u002Fstrong>. Real one-shot durations are in each frame's spec line.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== STATES HEADER ===== -->\n  <div style=\"display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1.5px solid #2A241F; padding-bottom: 14px; margin-bottom: 28px;\">\n    <h2 style=\"font-family: 'Playfair Display', serif; font-weight: 800; font-size: 34px; margin: 0;\">Eight states<\u002Fh2>\n    <div style=\"font-family:'Space Mono',monospace; font-size: 12px; color: #9A7B3C; letter-spacing: 0.12em;\">IDLE → LISTENING → RECORDING → PROCESSING → POLISHING → DONE → ERROR → CANCELLED<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px;\">\n\n    <!-- FRAME 1 IDLE -->\n    <div style=\"background: #F8F1E1; border: 1px solid #E0D4BC; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column;\">\n      <div style=\"display: flex; align-items: center; gap: 9px; padding: 13px 15px 11px;\">\n        <span style=\"font-family:'Space Mono',monospace; font-size: 12px; color: #B8893C;\">01<\u002Fspan>\n        <span style=\"font-family: 'Playfair Display', serif; font-weight: 700; font-size: 19px;\">Idle<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background: #221D19; position: relative; overflow: hidden; height: 236px;\">\n        <div style=\"position: absolute; inset: 0; background: radial-gradient(ellipse 48% 56% at 50% 42%, rgba(216,176,104,0.16), rgba(34,29,25,0) 66%);\"><\u002Fdiv>\n        <svg viewBox=\"0 0 160 185\" style=\"width: 100%; height: 188px; position: relative; display: block;\">\n          <ellipse cx=\"62\" cy=\"170\" rx=\"38\" ry 0 40\" style=\"width: 13px; height: 13px;\"><path d=\"M6,20.5 Q20,24 34,20.5 Q20,21.8 6,20.5 Z\" fill=\"#EBDCBE\"><\u002Fpath><path d=\"M10,21 L8.8,9 Q8.8,7 11,7 L29,7 Q31.2,7 31.2,9 L30,21 Z\" fill=\"#EBDCBE\"><\u002Fpath><rect x=\"9.5\" y=\"15\" width=\"21\" height=\"3\" fill=\"#B8893C\"><\u002Frect><path d=\"M20,29 C16.5,27 13,27.5 10.5,30 C13.5,29 16,29 17.5,30 C18.7,30.8 19,30 20,29.5 C21,30 21.3,30.8 22.5,30 C24,29 26.5,29 29.5,30 C27,27.5 23.5,27 20,29 Z\" fill=\"#EBDCBE\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #6B5E4C; margin-top: 7px;\">16px<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- tray context -->\n        <div style=\"flex: 1; min-width: 200px;\">\n          <div style=\"background: #1A1613; border-radius: 5px; padding: 7px 10px; display: flex; align-items: center; gap: 12px; justify-content: flex-end;\">\n            <span style=\"font-family:'Space Grotesk',sans-serif; font-size: 10px; color: #8C8276;\">▲<\u002Fspan>\n            <span style=\"width: 14px; height: 14px; opacity: 0.55;\"><svg viewBox=\"0 0 24 24\" fill=\"#C9BCA0\"><path d=\"M2 8h20v2H2zM2 13h20v2H2z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"width: 16px; height: 16px; background: #2A241F; border: 1px solid #B8893C; border-radius: 3px; display: flex; align-items: center; justify-content: center;\"><svg viewBox=\"0 0 40 40\" style=\"width: 13px; height: 13px;\"><path d=\"M6,20.5 Q20,24 34,20.5 Q20,21.8 6,20.5 Z\" fill=\"#EBDCBE\"><\u002Fpath><path d=\"M10,21 L8.8,9 Q8.8,7 11,7 L29,7 Q31.2,7 31.2,9 L30,21 Z\" fill=\"#EBDCBE\"><\u002Fpath><rect x=\"9.5\" y=\"15\" width=\"21\" height=\"3\" fill=\"#B8893C\"><\u002Frect><path d=\"M20,29 C16.5,27 13,27.5 10.5,30 C13.5,29 16,29 17.5,30 C18.7,30.8 19,30 20,29.5 C21,30 21.3,30.8 22.5,30 C24,29 26.5,29 29.5,30 C27,27.5 23.5,27 20,29 Z\" fill=\"#EBDCBE\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif; font-size: 10px; color: #8C8276; letter-spacing: 0.04em;\">4:08 PM<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace; font-size: 10px; color: #9A7B3C; margin-top: 8px; text-align: center;\">lives in the Windows system tray<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 12px; color: #4A4136; margin: 16px 0 0; line-height: 1.5;\">Below 24px the face drops away — only the top-hat silhouette, brass band and moustache survive. Monochrome cream on ink so it reads on any taskbar.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- STATUS OVERLAY IN CONTEXT -->\n    <div style=\"background: #F8F1E1; border: 1px solid #E0D4BC; border-radius: 6px; padding: 22px 24px;\">\n      <div style=\"font-family:'Space Mono',monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #9A7B3C; margin-bottom: 6px;\">Status overlay · in context<\u002Fdiv>\n      <h3 style=\"font-family: 'Playfair Display', serif; font-weight: 700; font-size: 22px; margin: 0 0 18px;\">A small card that never steals focus.<\u002Fh3>\n      <!-- faux desktop -->\n      <div style=\"background: #2E2A33; border-radius: 6px; height: 180px; position: relative; overflow: hidden;\">\n        <div style=\"position: absolute; inset: 0; background: repeating-linear-gradient(135deg, #322E38 0 18px, #2E2A33 18px 36px);\"><\u002Fdiv>\n        <!-- text caret variant -->\n        <div style=\"position: absolute; top: 26px; left: 24px; right: 120px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size: 11px; color: #C9C3D0; line-height: 1.6;\">I think we should ship it Friday<span style=\"display:inline-block; width: 1.5px; height: 13px; background: #fff; vertical-align: -2px; margin-left: 1px;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top: 8px; display: inline-flex; align-items: center; gap: 7px; background: #F8F1E1; border-radius: 7px; padding: 5px 9px; box-shadow: 0 5px 16px rgba(0,0,0,0.3);\">\n            <svg viewBox=\"0 0 40 40\" style=\"width: 18px; height: 18px;\"><path d=\"M6.5,20.5 Q20,24 33.5,20.5 Q20,21.8 6.5,20.5 Z\" fill=\"#1F1A17\"><\u002Fpath><path d=\"M10,21 L8.8,9 Q8.8,7 11,7 L29,7 Q31.2,7 31.2,9 L30,21 Z\" fill=\"#2A241F\"><\u002Fpath><ellipse cx=\"20\" cy=\"7\" rx=\"11.2\" ry=\"2\" fill=\"#332B25\"><\u002Fellipse><rect x=\"9.5\" y=\"15.5\" width=\"21\" height=\"3\" fill=\"#B8893C\"><\u002Frect><circle cx=\"20\" cy=\"29\" r=\"6\" fill=\"#EBDCBE\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-family:'Space Grotesk',sans-serif; font-size: 10px; font-weight: 500; color: #2A241F;\">Listening…<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #B9A9CA; margin-top: 6px;\">↑ follows the caret<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- bottom-right anchored -->\n        <div style=\"position: absolute; right: 14px; bottom: 14px; background: #F8F1E1; border: 1px solid #E0D4BC; border-radius: 9px; padding: 9px 12px; display: flex; align-items: center; gap: 9px; box-shadow: 0 8px 22px rgba(0,0,0,0.4); width: 210px;\">\n          <svg viewBox=\"0 0 40 40\" style=\"width: 26px; height: 26px; flex: none;\"><path d=\"M6.5,20.5 Q20,24 33.5,20.5 Q20,21.8 6.5,20.5 Z\" fill=\"#1F1A17\"><\u002Fpath><path d=\"M10,21 L8.8,9 Q8.8,7 11,7 L29,7 Q31.2,7 31.2,9 L30,21 Z\" fill=\"#2A241F\"><\u002Fpath><ellipse cx=\"20\" cy=\"7\" rx=\"11.2\" ry=\"2\" fill=\"#332B25\"><\u002Fellipse><rect x=\"9.5\" y=\"15.5\" width=\"21\" height=\"3\" fill=\"#B8893C\"><\u002Frect><circle cx=\"20\" cy=\"29\" r=\"6.5\" fill=\"#EBDCBE\"><\u002Fcircle><path d=\"M20,30 C17,28.5 14.5,29 13,31 C15,30.3 16.5,30.3 17.5,31 C18.5,31.7 19,31 20,30.5 C21,31 21.5,31.7 22.5,31 C23.5,30.3 25,30.3 27,31 C25.5,29 23,28.5 20,30 Z\" fill=\"#2A241F\"><\u002Fpath><\u002Fsvg>\n          <div>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size: 12px; font-weight: 600; color: #2A241F;\">Pasted, sir.<\u002Fdiv>\n            <div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #9A7B3C; margin-top: 1px;\">⌘ ⇧ V · 1.2s ago<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"margin-left: auto; width: 18px; height: 18px; border-radius: 50%; background: #1F8A5B; display: flex; align-items: center; justify-content: center; flex: none;\"><svg viewBox=\"0 0 24 24\" style=\"width: 11px; height: 11px;\" fill=\"none\" stroke=\"#F4ECD9\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position: absolute; right: 18px; bottom: 78px; font-family:'Space Mono',monospace; font-size: 9px; color: #B9A9CA;\">↓ default: bottom-right<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 12px; color: #4A4136; margin: 16px 0 0; line-height: 1.5;\">≈ 280×56, 12px radius, soft shadow, warm cream. Anchors bottom-right by default; can follow the caret on demand. Click-through, never grabs keyboard focus.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== REDUCED MOTION ===== -->\n  <div style=\"background: #2A241F; border-radius: 6px; padding: 28px 30px; margin-top: 22px; display: flex; gap: 36px; align-items: center; flex-wrap: wrap;\">\n    <div style=\"flex: 1; min-width: 320px;\">\n      <div style=\"font-family:'Space Mono',monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #D8B068; margin-bottom: 8px;\">Reduced motion variant<\u002Fdiv>\n      <h3 style=\"font-family: 'Playfair Display', serif; font-weight: 700; font-size: 24px; color: #F4ECD9; margin: 0 0 12px;\">Dignity holds still, too.<\u002Fh3>\n      <p style=\"font-size: 13.5px; line-height: 1.6; color: #C9BCA0; margin: 0; max-width: 520px;\">Under <span style=\"font-family:'Space Mono',monospace; color:#D8B068;\">prefers-reduced-motion<\u002Fspan>: no twirl, wiggle, bow or hat-fall. States cross-fade in 120ms; status text swaps instantly. Sound-waves collapse to a static three-dot glyph. Mistr Flo holds one composed idle pose throughout. <strong style=\"color:#F4ECD9;\">The tool stays exactly as fast.<\u002Fstrong><\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 14px; flex: none;\">\n      <div style=\"text-align: center;\">\n        <div style=\"width: 130px; height: 110px; background: #1F1A17; border-radius: 6px; display: flex; align-items: center; justify-content: center;\">\n          <svg viewBox=\"0 0 80 90\" style=\"width: 70px; height: 78px;\"><ellipse cx=\"40\" cy=\"84\" rx=\"22\" ry=\"3.5\" fill=\"rgba(0,0,0,0.4)\"><\u002Fellipse><circle cx=\"40\" cy=\"40\" r=\"17\" fill=\"#EBDCBE\"><\u002Fcircle><circle cx=\"33\" cy=\"38\" r=\"2.1\" fill=\"#2A241F\"><\u002Fcircle><circle cx=\"47\" cy=\"38\" r=\"2.1\" fill=\"#2A241F\"><\u002Fcircle><path d=\"M40,47 C36,45 32,45.5 29,48 C32,47 34,47 35.5,48 C37,49 38.5,48 40,47.5 C41.5,48 43,49 44.5,48 C46,47 48,47 51,48 C48,45.5 44,45 40,47 Z\" fill=\"#2A241F\"><\u002Fpath><path d=\"M15,21.5 Q40,27 65,21.5 Q40,23.5 15,21.5 Z\" fill=\"#1F1A17\"><\u002Fpath><path d=\"M26,22 L24.5,6.5 Q24.5,4 28,4 L52,4 Q55.5,4 55.5,6.5 L54,22 Z\" fill=\"#2A241F\"><\u002Fpath><ellipse cx=\"40\" cy=\"4\" rx=\"15.5\" ry=\"2.8\" fill=\"#332B25\"><\u002Fellipse><rect x=\"25.5\" y=\"14\" width=\"29\" height=\"4.5\" fill=\"#B8893C\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #8C8276; margin-top: 7px;\">single static pose<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align: center;\">\n        <div style=\"width: 130px; height: 110px; background: #F8F1E1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;\">\n          <div style=\"display: flex; gap: 5px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #B8893C;\"><\u002Fspan><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #B8893C; opacity: .55;\"><\u002Fspan><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #B8893C; opacity: .3;\"><\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size: 11px; font-weight: 500; color: #2A241F;\">Listening…<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size: 9px; color: #8C8276; margin-top: 7px;\">static 3-dot glyph<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-family:'Space Mono',monospace; font-size: 10.5px; color: #9A7B3C; text-align: center; margin-top: 36px; letter-spacing: 0.1em;\">MISTR FLOW · MOTION &amp; DESIGN STORYBOARD · HAND THIS TO THE IMPLEMENTER<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1400}}\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
