<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --card-cream: #f8f1e1;
        --stage: #221d19;
        --ink: #2a241f;
        --warm-charcoal: #6b5e4c;
        --brass: #b8893c;
        --light-brass: #d8b068;
        --border: #e0d4bc;
        --success: #1f8a5b;
        --face: #ebdcbe;
        --warm-white: #f4ecd9;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family:
          "Space Grotesk", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
          sans-serif;
        -webkit-app-region: no-drag;
        user-select: none;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }

      #mistr-flow-overlay {
        width: 292px;
        height: 172px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        pointer-events: none;
      }

      #mistr-flow-stage {
        position: relative;
        width: 280px;
        height: 112px;
        pointer-events: none;
      }

      #mistr-flow-stage::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 128px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(0, 0, 0, 0.55), transparent 68%);
        opacity: 0.5;
        transform: translateX(-50%);
      }

      #mascot {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 132px;
        height: 112px;
        pointer-events: auto;
        transform: translateX(-50%);
        transform-origin: 50% 92%;
        animation: shoulder-breathe 3.8s ease-in-out infinite;
      }

      .gentleman {
        position: absolute;
        left: 42px;
        bottom: 10px;
        width: 54px;
        height: 92px;
        transform-origin: 50% 92%;
        z-index: 2;
      }

      .top-hat {
        position: absolute;
        left: 13px;
        top: 4px;
        width: 29px;
        height: 20px;
        border-radius: 7px 7px 2px 2px;
        background: var(--ink);
        box-shadow: inset 0 -5px 0 var(--brass);
        transform-origin: 18% 90%;
        z-index: 3;
      }

      .top-hat::after {
        content: "";
        position: absolute;
        left: -12px;
        top: 18px;
        width: 53px;
        height: 5px;
        border-radius: 999px;
        background: var(--ink);
      }

      .face {
        position: absolute;
        left: 11px;
        top: 24px;
        width: 33px;
        height: 33px;
        border-radius: 50%;
        background: var(--face);
      }

      .brow {
        position: absolute;
        top: 32px;
        width: 12px;
        height: 3px;
        border-radius: 999px;
        background: var(--ink);
      }

      .brow.left {
        left: 13px;
        transform: rotate(4deg);
      }

      .brow.right {
        left: 31px;
        transform: rotate(-4deg);
      }

      .eye {
        position: absolute;
        top: 39px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--ink);
      }

      .eye.left {
        left: 19px;
      }

      .eye.right {
        left: 33px;
      }

      .moustache {
        position: absolute;
        left: 17px;
        top: 47px;
        width: 22px;
        height: 9px;
        transform-origin: center;
      }

      .moustache::before,
      .moustache::after {
        content: "";
        position: absolute;
        top: 0;
        width: 14px;
        height: 8px;
        border-radius: 50% 50% 45% 45%;
        background: var(--ink);
      }

      .moustache::before {
        right: 10px;
        transform: rotate(-13deg);
      }

      .moustache::after {
        left: 10px;
        transform: rotate(13deg);
      }

      .torso {
        position: absolute;
        left: 17px;
        top: 56px;
        width: 23px;
        height: 36px;
        background: linear-gradient(90deg, var(--ink) 0 28%, var(--warm-white) 29% 67%, var(--ink) 68%);
        clip-path: polygon(12% 0, 88% 0, 72% 100%, 28% 100%);
      }

      .bowtie {
        position: absolute;
        left: 20px;
        top: 57px;
        width: 17px;
        height: 9px;
        background: var(--brass);
        clip-path: polygon(0 0, 45% 50%, 0 100%, 100% 100%, 55% 50%, 100% 0);
      }

      .arm {
        position: absolute;
        right: 8px;
        top: 57px;
        width: 7px;
        height: 24px;
        border-radius: 999px;
        background: #4a4036;
        transform: rotate(-34deg);
        transform-origin: 50% 0;
      }

      .glove {
        position: absolute;
        right: 0;
        top: 62px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--warm-white);
        border: 1px solid rgba(42, 36, 31, 0.45);
      }

      .cane {
        position: absolute;
        right: 5px;
        bottom: -6px;
        width: 3px;
        height: 36px;
        border-radius: 999px;
        background: #4a4036;
        transform: rotate(-10deg);
        transform-origin: 50% 0;
        z-index: 1;
      }

      .ribbon {
        position: absolute;
        left: 82px;
        bottom: 30px;
        width: 76px;
        height: 28px;
        border-radius: 3px;
        background: var(--card-cream);
        opacity: 0;
        transform: rotate(-5deg) translateY(7px);
      }

      .ribbon::before,
      .ribbon::after {
        content: "";
        position: absolute;
        left: 12px;
        width: 42px;
        height: 3px;
        border-radius: 999px;
        background: rgba(107, 94, 76, 0.36);
      }

      .ribbon::before {
        top: 9px;
      }

      .ribbon::after {
        top: 18px;
        width: 54px;
      }

      .sparkle {
        position: absolute;
        left: 153px;
        bottom: 55px;
        width: 9px;
        height: 9px;
        background: var(--light-brass);
        clip-path: polygon(50% 0, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0 50%, 38% 38%);
        opacity: 0;
      }

      .microphone {
        position: absolute;
        right: -24px;
        bottom: 32px;
        width: 30px;
        height: 48px;
        z-index: 1;
      }

      .mic-head {
        position: absolute;
        left: 1px;
        top: 0;
        width: 28px;
        height: 38px;
        border: 3px solid var(--brass);
        border-radius: 999px;
        box-sizing: border-box;
      }

      .mic-head::before {
        content: "";
        position: absolute;
        left: 6px;
        right: 6px;
        top: 9px;
        height: 2px;
        background: var(--brass);
        box-shadow: 0 8px 0 var(--brass), 0 16px 0 var(--brass);
        opacity: 0.7;
      }

      .mic-stand {
        position: absolute;
        left: 14px;
        top: 38px;
        width: 4px;
        height: 39px;
        border-radius: 999px;
        background: #4a4036;
      }

      .mic-wave {
        position: absolute;
        right: 6px;
        top: 19px;
        width: 18px;
        height: 42px;
        border-right: 3px solid rgba(216, 176, 104, 0.5);
        border-radius: 50%;
        opacity: 0;
      }

      .flourish {
        position: absolute;
        right: -10px;
        bottom: 45px;
        width: 52px;
        height: 52px;
        border: 3px dashed rgba(184, 137, 60, 0.75);
        border-radius: 50%;
        opacity: 0;
      }

      #mistr-flow-card {
        box-sizing: border-box;
        width: 280px;
        height: 56px;
        display: grid;
        grid-template-columns: 30px 1fr 22px;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--card-cream);
        color: var(--ink);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
        pointer-events: auto;
        transition:
          border-color 120ms ease,
          opacity 120ms ease,
          transform 120ms ease;
      }

      #compact-mascot {
        position: relative;
        display: none;
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background:
          radial-gradient(circle at 50% 48%, rgba(244, 236, 217, 0.18), transparent 58%),
          var(--stage);
      }

      #compact-mascot::before {
        content: "🎩";
        position: absolute;
        left: 2px;
        top: 0;
        font-size: 17px;
        line-height: 1;
      }

      #compact-mascot::after {
        content: "⌒⌒";
        position: absolute;
        left: 5px;
        bottom: 2px;
        color: var(--warm-white);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: -0.18em;
      }

      .copy {
        grid-column: 2;
        min-width: 0;
      }

      .brand {
        display: block;
        color: var(--warm-charcoal);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.16em;
        line-height: 1;
        text-transform: uppercase;
      }

      #status-copy {
        display: block;
        overflow: hidden;
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #state-indicator {
        grid-column: 3;
        justify-self: center;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--brass);
        box-shadow: 0 0 0 3px rgba(184, 137, 60, 0.18);
      }

      #toast {
        position: absolute;
        bottom: 62px;
        left: 0;
        right: 0;
        text-align: center;
        color: var(--warm-white);
        font-size: 12px;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      }

      #mistr-flow-overlay[data-phase="idle"] #mascot {
        animation: shoulder-breathe 3.8s ease-in-out infinite;
      }

      #mistr-flow-overlay[data-phase="listening"] .gentleman {
        animation: hat-tip 380ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      #mistr-flow-overlay[data-phase="listening"] .top-hat {
        transform: rotate(-13deg) translateY(-3px);
      }

      #mistr-flow-overlay[data-phase="recording"] .moustache {
        animation: moustache-wiggle 1.1s ease-in-out infinite;
      }

      #mistr-flow-overlay[data-phase="recording"] .mic-wave {
        animation: wave-pulse 1.1s ease-in-out infinite;
      }

      #mistr-flow-overlay[data-phase="recording"] .cane {
        animation: cane-recording-sway 1.1s ease-in-out infinite;
      }

      #mistr-flow-overlay[data-phase="recording"] .gentleman {
        animation: gentle-nod 1.4s ease-in-out infinite;
      }

      #mistr-flow-overlay[data-phase="processing"] .cane {
        animation: cane-twirl 560ms cubic-bezier(0.45, 0, 0.55, 1);
      }

      #mistr-flow-overlay[data-phase="processing"] .flourish {
        animation: flourish-spin 560ms cubic-bezier(0.45, 0, 0.55, 1);
      }

      #mistr-flow-overlay[data-phase="polishing"] .ribbon,
      #mistr-flow-overlay[data-phase="polishing"] .sparkle {
        animation: brush-reveal 680ms ease-in-out forwards;
      }

      #mistr-flow-overlay[data-phase="polishing"] .arm {
        animation: brush-arm 680ms ease-in-out;
      }

      #mistr-flow-overlay[data-phase="done"] #state-indicator {
        background: var(--success);
        box-shadow: 0 0 0 3px rgba(31, 138, 91, 0.16);
      }

      #mistr-flow-overlay[data-phase="done"] .gentleman {
        animation: polite-bow 520ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #mistr-flow-overlay[data-phase="done"] .top-hat {
        transform: rotate(-16deg) translate(-3px, -8px);
      }

      #mistr-flow-overlay[data-phase="error"] .top-hat {
        animation: hat-fall 460ms cubic-bezier(0.5, 0, 0.75, 0) forwards;
      }

      #mistr-flow-overlay[data-phase="error"] .brow.left {
        transform: rotate(-18deg) translateY(-2px);
      }

      #mistr-flow-overlay[data-phase="error"] .brow.right {
        transform: rotate(18deg) translateY(-2px);
      }

      #mistr-flow-overlay[data-phase="cancelled"] #mascot {
        animation: exit-stage-left 640ms cubic-bezier(0.4, 0, 1, 1) forwards;
      }

      #mistr-flow-overlay[data-phase="cancelled"] #mistr-flow-card {
        opacity: 0.78;
      }

      @keyframes shoulder-breathe {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) scaleY(1);
        }
        50% {
          transform: translateX(-50%) translateY(1px) scaleY(0.985);
        }
      }

      @keyframes hat-tip {
        0%,
        100% {
          transform: rotate(0) translateX(0);
        }
        50% {
          transform: rotate(-3deg) translateX(5px);
        }
      }

      @keyframes moustache-wiggle {
        0%,
        100% {
          transform: scaleX(1);
        }
        50% {
          transform: scaleX(1.22);
        }
      }

      @keyframes wave-pulse {
        0%,
        100% {
          opacity: 0.2;
          transform: translateX(0) scaleX(0.72);
        }
        50% {
          opacity: 1;
          transform: translateX(11px) scaleX(1.35);
        }
      }

      @keyframes cane-recording-sway {
        0%,
        100% {
          transform: rotate(-10deg);
        }
        50% {
          transform: rotate(-4deg) translateX(1px);
        }
      }

      @keyframes gentle-nod {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(1.5deg) translateY(1px);
        }
      }

      @keyframes cane-twirl {
        from {
          transform: rotate(-10deg);
        }
        to {
          transform: rotate(350deg);
        }
      }

      @keyframes flourish-spin {
        0% {
          opacity: 0;
          transform: rotate(0deg) scale(0.72);
        }
        35% {
          opacity: 0.9;
        }
        100% {
          opacity: 0;
          transform: rotate(1turn) scale(1.08);
        }
      }

      @keyframes brush-reveal {
        0% {
          opacity: 0;
          transform: rotate(-5deg) translateY(7px);
        }
        45%,
        100% {
          opacity: 1;
          transform: rotate(-5deg) translateY(0);
        }
      }

      @keyframes brush-arm {
        0%,
        100% {
          transform: rotate(-12deg);
        }
        45% {
          transform: rotate(-54deg) translateX(7px);
        }
      }

      @keyframes polite-bow {
        0%,
        100% {
          transform: rotate(0deg);
        }
        55% {
          transform: rotate(8deg) translateY(4px);
        }
      }

      @keyframes hat-fall {
        0% {
          transform: rotate(0) translate(0, 0);
        }
        100% {
          transform: rotate(122deg) translate(16px, 27px);
        }
      }

      @keyframes exit-stage-left {
        0% {
          opacity: 1;
          transform: translateX(-50%);
        }
        100% {
          opacity: 0.34;
          transform: translateX(-105%) translateY(5px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #mistr-flow-stage {
          display: block;
        }

        #compact-mascot {
          display: none;
        }

        #mistr-flow-overlay {
          height: 172px;
          justify-content: flex-end;
        }

        #mistr-flow-card {
          grid-template-columns: 30px 1fr 22px;
          transition-duration: 120ms;
        }

        #mistr-flow-overlay *,
        #mistr-flow-overlay *::before,
        #mistr-flow-overlay *::after {
          animation-duration: 220ms !important;
          animation-iteration-count: 1 !important;
        }

        #mistr-flow-overlay[data-phase="recording"] .moustache,
        #mistr-flow-overlay[data-phase="recording"] .mic-wave,
        #mistr-flow-overlay[data-phase="recording"] .gentleman,
        #mistr-flow-overlay[data-phase="recording"] .cane {
          animation-duration: 1.1s !important;
          animation-iteration-count: infinite !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="mistr-flow-overlay" data-phase="idle">
      <div id="mistr-flow-stage" aria-hidden="true">
        <div id="mascot">
          <div class="gentleman">
            <div class="top-hat"></div>
            <div class="face"></div>
            <div class="brow left"></div>
            <div class="brow right"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="moustache"></div>
            <div class="torso"></div>
            <div class="bowtie"></div>
            <div class="arm"></div>
            <div class="glove"></div>
            <div class="cane"></div>
          </div>
          <div class="ribbon"></div>
          <div class="sparkle"></div>
          <div class="microphone">
            <div class="mic-head"></div>
            <div class="mic-stand"></div>
          </div>
          <div class="mic-wave"></div>
          <div class="flourish"></div>
        </div>
      </div>
      <section id="mistr-flow-card" aria-live="polite">
        <div id="compact-mascot" aria-hidden="true"></div>
        <div class="copy">
          <span class="brand">Mistr Flow</span>
          <span id="status-copy">Ready when you are, sir.</span>
        </div>
        <div id="state-indicator" aria-hidden="true"></div>
      </section>
    </div>
    <div id="toast"></div>
    <script src="./overlay-renderer.js"></script>
  </body>
</html>
