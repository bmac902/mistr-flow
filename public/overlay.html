<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>

:root {
  --card-cream: #f8f1e1;
  --stage: #221d19;
  --ink: #2a241f;
  --warm-charcoal: #6b5e4c;
  --brass: #b8893c;
  --border: #e0d4bc;
  --success: #1f8a5b;
  --warm-white: #f4ecd9;
}
html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: "Space Grotesk", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-app-region: no-drag;
  user-select: none;
}
body {
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
#mistr-flow-overlay {
  width: 292px;
  height: 172px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  pointer-events: none;
}
#mistr-flow-overlay.mf-state-capture-picker {
  height: auto;
  min-height: 172px;
}
#mistr-flow-stage {
  position: relative;
  width: 280px;
  height: 112px;
  pointer-events: none;
}
#mistr-flow-stage::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 4px;
  width: 128px;
  height: 18px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(0, 0, 0, 0.55), transparent 68%);
  opacity: 0.5;
  transform: translateX(-50%);
}
#mascot {
  position: absolute;
  left: 50%;
  bottom: -2px;
  width: 96px;
  height: 111px;
  pointer-events: auto;
  transform: translateX(-50%);
  overflow: visible;
}
#mascot .mf-root-offset {
  transform: translateX(18px);
}
.mf-recording-only,
.mf-polishing-only,
.mf-refused-only,
.mf-summon-only,
.mf-picker-rest-only,
.mf-delivering-only,
.mf-delivery-failed-only,
.mf-pocket-only,
.mf-bell-only,
.mf-ledger-only,
.mf-note-only,
.mf-portrait-only,
.mf-monocle-only,
.mf-busy-only,
.mf-watch-only,
.mf-folder-only,
.mf-folders-only,
.mf-behind-arm-only {
  display: none;
}
.mf-state-recording .mf-recording-only,
.mf-state-polishing .mf-polishing-only,
.mf-state-refused .mf-refused-only,
.mf-state-capture-picker.mf-picker-summoning .mf-summon-only,
.mf-state-capture-picker:not(.mf-picker-summoning) .mf-picker-rest-only,
.mf-state-capture-delivering .mf-delivering-only,
.mf-state-capture-delivery-failed .mf-delivery-failed-only,
.mf-state-relay-nothing-to-send .mf-pocket-only,
.mf-state-relay-no-destination .mf-bell-only,
.mf-ledger-spill .mf-ledger-only,
.mf-state-relay-delivering.mf-payload-note .mf-note-only,
.mf-state-relay-delivering.mf-payload-portrait .mf-portrait-only,
.mf-state-capture-framing .mf-monocle-only,
.mf-state-relay-delivered-busy .mf-busy-only,
.mf-state-fleet-unknown .mf-watch-only,
.mf-state-fleet-2-3-blocked .mf-folder-only,
.mf-state-fleet-4-plus-blocked .mf-folders-only,
.mf-state-fleet-4-plus-blocked .mf-behind-arm-only {
  display: inline;
}
#mistr-flow-card {
  box-sizing: border-box;
  width: 280px;
  height: 56px;
  display: grid;
  grid-template-columns: 30px 1fr 22px;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--card-cream);
  color: var(--ink);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
  pointer-events: auto;
}
#compact-mascot {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
}
#compact-mascot svg {
  display: block;
}
.copy {
  grid-column: 2;
  min-width: 0;
}
.brand {
  display: block;
  color: var(--warm-charcoal);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.16em;
  line-height: 1;
  text-transform: uppercase;
}
#status-copy {
  display: block;
  overflow: hidden;
  color: var(--ink);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1.3;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#state-indicator {
  grid-column: 3;
  justify-self: center;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
}
#state-indicator > * { display: none; }
.mf-state-listening #indicator-dot,
.mf-state-recording #indicator-bars,
.mf-state-processing #indicator-spinner,
.mf-state-polishing #indicator-polishing,
.mf-state-done #indicator-check,
.mf-state-error #indicator-warn,
.mf-state-cancelled #indicator-cancelled { display: block; }
#toast {
  position: absolute;
  bottom: 62px;
  left: 0;
  right: 0;
  text-align: center;
  color: var(--warm-white);
  font-size: 12px;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
}
/*
 * Capture preview (#35) — shows what was actually grabbed, so a wrong capture
 * is caught here rather than after a live agent asks "what is this?".
 * Its total height budget is mirrored by CAPTURE_PREVIEW_BLOCK_HEIGHT in
 * src/captureWindowBounds.ts, which sizes the window: 146 image box + 8*2
 * frame padding + 2 border + 4 gap + 16 caption + 8 margin = 186.
 */
#capture-preview {
  display: none;
  position: relative;
  box-sizing: border-box;
  flex-direction: column;
  gap: 4px;
  width: 280px;
  /* figure's UA default margin is 1em 40px — reset it, keep only the gap. */
  margin: 0 0 8px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card-cream);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
  /* Interactive only once it has something to crop — see updateMousePassThrough. */
  pointer-events: none;
}
.mf-state-capture-picker #capture-preview.has-preview {
  display: flex;
  pointer-events: auto;
  cursor: crosshair;
}
#capture-preview-image {
  display: block;
  width: 100%;
  height: 146px;
  border-radius: 4px;
  background: var(--stage);
  object-fit: contain;
  -webkit-user-drag: none;
}
/* Relayed-text preview: the copied head, in place of the thumbnail (issue #39). */
#capture-preview-text {
  display: none;
  box-sizing: border-box;
  width: 100%;
  height: 146px;
  margin: 0;
  padding: 6px 8px;
  overflow: hidden;
  border-radius: 4px;
  background: var(--stage);
  color: var(--warm-charcoal);
  font-size: 11px;
  line-height: 1.35;
  white-space: pre-wrap;
  word-break: break-word;
}
#capture-preview.is-text #capture-preview-image {
  display: none;
}
#capture-preview.is-text #capture-preview-text {
  display: block;
}
/* Relayed text isn't croppable, so the panel isn't a crop target. */
#capture-preview.is-text {
  cursor: default;
}
/* Marquee drawn while dragging a crop; positioned against #capture-preview. */
#capture-crop-rect {
  display: none;
  position: absolute;
  z-index: 1;
  border: 1px solid var(--brass);
  background: rgba(184, 137, 60, 0.22);
  pointer-events: none;
}
#capture-preview-title {
  overflow: hidden;
  height: 16px;
  line-height: 16px;
  color: var(--warm-charcoal);
  font-size: 11px;
  text-align: center;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#capture-picker-entries {
  display: none;
  flex-direction: column;
  gap: 4px;
  width: 280px;
  margin-bottom: 8px;
  pointer-events: none;
}
.mf-state-capture-picker #capture-picker-entries {
  display: flex;
}
.capture-picker-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  box-sizing: border-box;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card-cream);
  color: var(--ink);
  font-size: 12px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
  opacity: 0;
  transform: translateY(4px);
  animation: mf-picker-entry-in 180ms ease-out forwards;
}
.capture-picker-entry-digit {
  flex: none;
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: var(--brass);
  color: var(--card-cream);
  font-weight: 700;
  font-size: 10px;
}
.capture-picker-entry-label {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
@keyframes mf-picker-entry-in {
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  #mistr-flow-stage { display: block; }
  #compact-mascot { display: block; }
  #mistr-flow-overlay { height: 172px; justify-content: flex-end; }
  #mistr-flow-overlay.mf-state-capture-picker { height: auto; }
  .capture-picker-entry {
    animation: none !important;
    opacity: 1;
    transform: none;
  }
}

/*
 * mistr-flow.css
 * All @keyframes and state-driven animation classes for Mistr Flow.
 * Import once in your app entry point: import './mistr-flow.css';
 *
 * Class hooks expected on SVG elements:
 *   .mf-mascot          root <svg> — also carries .mf-state-{state}
 *   .mf-figure          outermost group (exits on cancelled)
 *   .mf-body            body + head group (breathe / lean / nod / tilt / bow)
 *   .mf-hat             hat group inside .mf-body (tiphat / hatfall)
 *   .mf-eyes            eyes group inside .mf-body (blink)
 *   .mf-brows           brows group inside .mf-body (fret — error only)
 *   .mf-moustache       moustache path (wiggle — recording only)
 *   .mf-cane            cane group (twirl / flick)
 *   .mf-arm             arm + glove group (brush — polishing)
 *   .mf-wave            sound-wave paths (rendered only when recording)
 *   .mf-words-messy     sentence ribbon text before clean (polishing)
 *   .mf-words-clean     sentence ribbon text after clean (polishing)
 */

/* ── Keyframes ────────────────────────────────────────────────────────────── */

@keyframes mf-breathe {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-2.5px); }
}

@keyframes mf-blink {
  0%, 94%, 100% { transform: scaleY(1); }
  97%            { transform: scaleY(0.1); }
}

@keyframes mf-tiphat {
  0%, 8%    { transform: rotate(0deg) translateY(0); }
  22%       { transform: rotate(-15deg) translateY(-3px); }
  60%       { transform: rotate(-15deg) translateY(-3px); }
  76%, 100% { transform: rotate(0deg) translateY(0); }
}

@keyframes mf-lean {
  0%, 8%    { transform: rotate(0deg); }
  24%       { transform: rotate(5deg); }
  60%       { transform: rotate(5deg); }
  80%, 100% { transform: rotate(0deg); }
}

@keyframes mf-wiggle {
  0%, 100% { transform: rotate(-3deg); }
  25%      { transform: rotate(3deg) scaleX(1.05); }
  50%      { transform: rotate(-2.5deg); }
  75%      { transform: rotate(2.5deg); }
}

@keyframes mf-nod {
  0%, 100% { transform: rotate(0deg); }
  50%      { transform: rotate(2.5deg); }
}

@keyframes mf-wave {
  0%   { opacity: 0; transform: translateX(-3px) scale(0.7); }
  35%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(5px) scale(1.2); }
}

@keyframes mf-twirl {
  0%, 12%   { transform: rotate(0deg); }
  56%       { transform: rotate(360deg); }
  72%, 100% { transform: rotate(360deg); }
}

@keyframes mf-tilt {
  0%, 12%, 72%, 100% { transform: rotate(0deg); }
  30%, 56%            { transform: rotate(-5deg); }
}

@keyframes mf-brush {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25%      { transform: translate(-6px, -1px) rotate(-7deg); }
  50%      { transform: translate(5px, 1px) rotate(5deg); }
  75%      { transform: translate(-3px, 0) rotate(-4deg); }
}

@keyframes mf-fadeout {
  0%, 38%   { opacity: 1; }
  54%, 100% { opacity: 0; }
}

@keyframes mf-fadein {
  0%, 40%   { opacity: 0; }
  56%, 100% { opacity: 1; }
}

@keyframes mf-bow {
  0%, 16% { transform: rotate(0deg); }
  42%     { transform: rotate(13deg); }
  60%     { transform: rotate(13deg); }
  80%     { transform: rotate(-3deg); }
  100%    { transform: rotate(0deg); }
}

@keyframes mf-flick {
  0%, 16%   { transform: rotate(0deg); }
  40%       { transform: rotate(-22deg); }
  60%       { transform: rotate(-22deg); }
  82%, 100% { transform: rotate(0deg); }
}

@keyframes mf-hatfall {
  0%, 20%   { transform: translateY(0) rotate(0deg); }
  46%       { transform: translateY(40px) rotate(40deg); }
  56%       { transform: translateY(35px) rotate(34deg); }
  64%, 86%  { transform: translateY(39px) rotate(38deg); }
  96%, 100% { transform: translateY(0) rotate(0deg); }
}

@keyframes mf-fret {
  0%, 100%   { transform: translateY(0); }
  30%, 60%   { transform: translateY(-2px); }
}

@keyframes mf-exit {
  0%, 12%   { transform: translateX(0); opacity: 1; }
  46%       { transform: translateX(-58px); opacity: 0; }
  60%, 88%  { transform: translateX(-58px); opacity: 0; }
  100%      { transform: translateX(-58px); opacity: 0; }
}

@keyframes mf-pulse {
  0%, 100% { opacity: 0.4; }
  50%      { opacity: 1; }
}

@keyframes mf-spin {
  to { transform: rotate(360deg); }
}

@keyframes mf-bar {
  0%, 100% { transform: scaleY(0.4); }
  50%      { transform: scaleY(1); }
}

@keyframes mf-scold-wag {
  0%, 10%   { transform: rotate(0deg); }
  30%       { transform: rotate(-30deg); }
  50%       { transform: rotate(30deg); }
  70%       { transform: rotate(-30deg); }
  90%, 100% { transform: rotate(30deg); }
}

@keyframes mf-headshake {
  0%, 100% { transform: rotate(0deg); }
  20%      { transform: rotate(-4deg); }
  40%      { transform: rotate(4deg); }
  60%      { transform: rotate(-4deg); }
  80%      { transform: rotate(2deg); }
}

@keyframes mf-summon-scan {
  0%, 100% { transform: rotate(0deg); }
  25%      { transform: rotate(-6deg); }
  75%      { transform: rotate(6deg); }
}

@keyframes mf-summon-tap {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  25%      { transform: rotate(-10deg) translateY(2px); }
  50%      { transform: rotate(0deg) translateY(0); }
  75%      { transform: rotate(-10deg) translateY(2px); }
}

@keyframes mf-count-fingers {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  20%      { transform: rotate(-9deg) translateY(-1px); }
  40%      { transform: rotate(5deg); }
  60%      { transform: rotate(-9deg) translateY(-1px); }
  80%      { transform: rotate(5deg); }
}

@keyframes mf-deliver-lean {
  0%, 100% { transform: rotate(4deg) translateX(1px); }
  50%      { transform: rotate(7deg) translateX(2px); }
}

@keyframes mf-offer {
  0%, 100% { transform: rotate(0deg) translateX(0); }
  50%      { transform: rotate(-11deg) translateX(3px); }
}

@keyframes mf-tiphat-toward {
  0%, 10%   { transform: rotate(0deg) translateY(0); }
  40%       { transform: rotate(-18deg) translateY(-4px); }
  65%       { transform: rotate(-18deg) translateY(-4px); }
  100%      { transform: rotate(0deg) translateY(0); }
}

@keyframes mf-lean-deliver {
  0%, 10%   { transform: rotate(0deg); }
  40%       { transform: rotate(6deg); }
  65%       { transform: rotate(6deg); }
  100%      { transform: rotate(0deg); }
}

@keyframes mf-hat-droop {
  0%, 15%   { transform: rotate(0deg) translateY(0); }
  60%, 100% { transform: rotate(15deg) translateY(3px); }
}

@keyframes mf-slouch {
  0%, 15%   { transform: translateY(0) rotate(0deg); }
  100%      { transform: translateY(2px) rotate(-2deg); }
}

@keyframes mf-puzzled-slump {
  0%, 10%   { transform: rotate(-6deg); }
  40%, 100% { transform: rotate(3deg) translateY(1px); }
}

@keyframes mf-facepalm {
  0%, 8%    { transform: rotate(0deg) translate(0,0); }
  32%       { transform: rotate(-98deg) translate(-2px,-3px); }
  46%, 86%  { transform: rotate(-98deg) translate(-1px,-4px); }
  100%      { transform: rotate(-98deg) translate(-2px,-3px); }
}

@keyframes mf-twirl-ccw {
  0%, 12%   { transform: rotate(0deg); }
  56%       { transform: rotate(-360deg); }
  72%, 100% { transform: rotate(-360deg); }
}

@keyframes mf-terminal-fall {
  0%, 20%   { transform: translate(0,0) rotate(0deg); }
  70%       { transform: translate(-14px,54px) rotate(-70deg); }
  100%      { transform: translate(-14px,58px) rotate(-78deg); }
}

@keyframes mf-sparkle-a {
  0%, 100%  { opacity: 0; transform: scale(0.4) rotate(0deg); }
  40%       { opacity: 1; transform: scale(1) rotate(20deg); }
  70%       { opacity: 0.6; }
}

@keyframes mf-sparkle-b {
  0%, 20%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
  55%           { opacity: 1; transform: scale(1.1) rotate(-15deg); }
  85%           { opacity: 0.4; }
}

@keyframes mf-sparkle-c {
  0%, 40%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
  70%           { opacity: 1; transform: scale(0.9) rotate(25deg); }
}

@keyframes mf-puzzled-tilt {
  0%, 100%  { transform: rotate(-6deg); }
  50%       { transform: rotate(6deg); }
}

@keyframes mf-pocket-pat {
  0%, 10%   { transform: rotate(0deg) translate(0,0); }
  30%       { transform: rotate(50deg) translate(-3px,10px); }
  50%       { transform: rotate(34deg) translate(-2px,7px); }
  70%       { transform: rotate(50deg) translate(-3px,10px); }
  100%      { transform: rotate(34deg) translate(-2px,7px); }
}

@keyframes mf-pocket-flap {
  0%, 22%   { transform: rotate(0deg); opacity: 0; }
  48%       { transform: rotate(24deg); opacity: 1; }
  78%       { transform: rotate(24deg); opacity: 1; }
  100%      { transform: rotate(0deg); opacity: 0; }
}

@keyframes mf-disappoint {
  0%, 25%   { transform: rotate(0deg) translateY(0); }
  100%      { transform: rotate(5deg) translateY(2px); }
}

@keyframes mf-bell-tap {
  0%, 14%   { transform: rotate(0deg) translate(0,0); }
  34%       { transform: rotate(42deg) translate(1px,3px); }
  54%, 100% { transform: rotate(24deg) translate(1px,2px); }
}

@keyframes mf-ding-ripple {
  0%, 26%   { opacity: 0; transform: scale(0.3); }
  40%       { opacity: 1; transform: scale(0.7); }
  66%       { opacity: 0.4; transform: scale(1.3); }
  100%      { opacity: 0; transform: scale(1.7); }
}

@keyframes mf-empty-hold {
  0%, 100%  { transform: rotate(0deg); }
  50%       { transform: rotate(-2deg); }
}

@keyframes mf-ledger-stagger {
  0%, 100%  { transform: rotate(-4deg) translateX(-1px); }
  50%       { transform: rotate(4deg) translateX(1px); }
}

@keyframes mf-ledger-hug {
  0%, 100%  { transform: rotate(0deg) translateY(0); }
  50%       { transform: rotate(-3deg) translateY(1px); }
}

@keyframes mf-monocle-raise {
  0%, 10%   { transform: rotate(0deg) translate(0,0); }
  45%, 100% { transform: rotate(-118deg) translate(-5px,-13px); }
}

@keyframes mf-appraise-tilt {
  0%, 15%   { transform: rotate(0deg); }
  45%, 100% { transform: rotate(-6deg); }
}

@keyframes mf-glance-aside {
  0%, 18%, 82%, 100% { transform: rotate(0deg); }
  42%, 58%            { transform: rotate(13deg); }
}

@keyframes mf-note-offer {
  0%, 100%  { transform: rotate(0deg) translateX(0); }
  50%       { transform: rotate(-9deg) translateX(2px); }
}

@keyframes mf-portrait-offer {
  0%, 100%  { transform: rotate(0deg) translateX(0); }
  50%       { transform: rotate(-10deg) translateX(3px); }
}

@keyframes mf-watch-raise {
  0%, 10%   { transform: rotate(0deg) translate(0,0); }
  40%, 100% { transform: rotate(-72deg) translate(-3px,-9px); }
}

@keyframes mf-look-around {
  0%, 100%  { transform: rotate(-4deg); }
  50%       { transform: rotate(4deg); }
}

@keyframes mf-alert-turn {
  0%, 15%   { transform: rotate(0deg); }
  100%      { transform: rotate(3deg); }
}

@keyframes mf-eyes-forward {
  0%, 20%   { transform: translateX(0); }
  60%, 100% { transform: translateX(1.2px); }
}

@keyframes mf-brace-shift {
  0%, 100%  { transform: translateX(-1px) rotate(-1deg); }
  50%       { transform: translateX(1px) rotate(1deg); }
}

/* ── Base transform properties ────────────────────────────────────────────── */
/* Applied unconditionally so animations have correct origins. */

.mf-body {
  transform-box: fill-box;
  transform-origin: 50% 100%;
}

.mf-hat {
  transform-box: fill-box;
  transform-origin: 50% 88%;
}

.mf-eyes {
  transform-box: fill-box;
  transform-origin: 50% 50%;
}

.mf-brows {
  transform-box: fill-box;
  transform-origin: 50% 50%;
}

.mf-moustache {
  transform-box: fill-box;
  transform-origin: 50% 30%;
}

.mf-cane {
  transform-box: fill-box;
  transform-origin: 42% 6%;
}

.mf-arm {
  transform-box: fill-box;
  transform-origin: 0% 0%;
}

.mf-figure {
  transform-box: fill-box;
  transform-origin: 50% 50%;
}

/* ── State: idle ──────────────────────────────────────────────────────────── */

.mf-state-idle .mf-body {
  animation: mf-breathe 3.8s ease-in-out infinite;
}
.mf-state-idle .mf-eyes {
  animation: mf-blink 5s ease-in-out infinite;
}

/* ── State: listening ─────────────────────────────────────────────────────── */

.mf-state-listening .mf-body {
  animation: mf-lean 380ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
.mf-state-listening .mf-hat {
  animation: mf-tiphat 380ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

/* ── State: recording ─────────────────────────────────────────────────────── */

.mf-state-recording .mf-body {
  animation: mf-nod 1.6s ease-in-out infinite;
}
.mf-state-recording .mf-moustache {
  animation: mf-wiggle 1.1s ease-in-out infinite;
}
.mf-state-recording .mf-wave-1 {
  animation: mf-wave 1.4s ease-out infinite;
}
.mf-state-recording .mf-wave-2 {
  animation: mf-wave 1.4s ease-out 0.35s infinite;
}

/* ── State: processing ────────────────────────────────────────────────────── */

.mf-state-processing .mf-cane {
  animation: mf-twirl 560ms cubic-bezier(0.45, 0, 0.55, 1) forwards;
}
.mf-state-processing .mf-body {
  animation: mf-tilt 560ms ease-in-out forwards;
}

/* ── State: polishing ─────────────────────────────────────────────────────── */

.mf-state-polishing .mf-arm {
  animation: mf-brush 0.68s ease-in-out infinite;
}
.mf-state-polishing .mf-words-messy {
  animation: mf-fadeout 680ms ease-in-out forwards;
}
.mf-state-polishing .mf-words-clean {
  animation: mf-fadein 680ms ease-in-out forwards;
}

/* ── State: done ──────────────────────────────────────────────────────────── */

.mf-state-done .mf-body {
  animation: mf-bow 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.mf-state-done .mf-cane {
  animation: mf-flick 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* ── State: error ─────────────────────────────────────────────────────────── */

.mf-state-error .mf-hat {
  animation: mf-hatfall 460ms cubic-bezier(0.5, 0, 0.75, 0) forwards;
}
.mf-state-error .mf-brows {
  animation: mf-fret 1.8s ease-in-out infinite;
}

/* ── State: cancelled ─────────────────────────────────────────────────────── */

.mf-state-cancelled .mf-figure {
  animation: mf-exit 640ms cubic-bezier(0.4, 0, 1, 1) forwards;
}

/* ── State: refused ───────────────────────────────────────────────────────── */

.mf-state-refused .mf-arm {
  animation: mf-scold-wag 700ms ease-in-out forwards;
  transform-origin: 75% 68%;
}
.mf-state-refused .mf-body {
  animation: mf-headshake 700ms ease-in-out forwards;
}

/* ── State: capture-picker ────────────────────────────────────────────────── */

.mf-state-capture-picker .mf-body {
  animation: mf-breathe 3.8s ease-in-out infinite;
}
.mf-state-capture-picker .mf-arm {
  animation: mf-count-fingers 2.4s ease-in-out infinite;
}
.mf-state-capture-picker.mf-picker-summoning .mf-body {
  animation: mf-summon-scan 620ms ease-in-out 1;
}
.mf-state-capture-picker.mf-picker-summoning .mf-cane {
  animation: mf-summon-tap 620ms ease-in-out 1;
}

/* ── State: capture-delivering ────────────────────────────────────────────── */

.mf-state-capture-delivering .mf-body {
  animation: mf-deliver-lean 1.6s ease-in-out infinite;
}
.mf-state-capture-delivering .mf-arm {
  animation: mf-offer 1.6s ease-in-out infinite;
}

/* ── State: capture-delivered ─────────────────────────────────────────────── */

.mf-state-capture-delivered .mf-hat {
  animation: mf-tiphat-toward 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.mf-state-capture-delivered .mf-body {
  animation: mf-lean-deliver 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.mf-state-capture-delivered .mf-cane {
  animation: mf-twirl-ccw 640ms cubic-bezier(0.45, 0, 0.55, 1) forwards;
}

/* ── State: capture-delivery-failed ───────────────────────────────────────── */

.mf-state-capture-delivery-failed .mf-hat {
  animation: mf-hat-droop 480ms ease-in forwards;
}
.mf-state-capture-delivery-failed .mf-body {
  animation: mf-slouch 480ms ease-in forwards;
}

/* ── State: capture-delivery-unknown ──────────────────────────────────────── */

.mf-state-capture-delivery-unknown .mf-body {
  animation: mf-puzzled-slump 2.2s ease-in-out infinite;
}
.mf-state-capture-delivery-unknown .mf-arm {
  animation: mf-facepalm 2.2s ease-in-out infinite;
}

/* ── State: relay-nothing-to-send ─────────────────────────────────────────── */

.mf-state-relay-nothing-to-send .mf-body {
  animation: mf-disappoint 900ms ease-in forwards;
}
.mf-state-relay-nothing-to-send .mf-arm {
  animation: mf-pocket-pat 900ms ease-in-out forwards;
}
.mf-state-relay-nothing-to-send .mf-pocket-only {
  animation: mf-pocket-flap 900ms ease-in-out forwards;
}

/* ── State: relay-no-destination ──────────────────────────────────────────── */

.mf-state-relay-no-destination .mf-body {
  animation: mf-empty-hold 3.4s ease-in-out infinite;
}
.mf-state-relay-no-destination .mf-arm {
  animation: mf-bell-tap 900ms ease-in-out forwards;
}
.mf-state-relay-no-destination .mf-bell-only .mf-ding {
  animation: mf-ding-ripple 900ms ease-out forwards;
}

/* ── Modifier: ledger spill (rides capture-picker / relay-delivering) ────── */

.mf-ledger-spill .mf-body {
  animation: mf-ledger-stagger 1.8s ease-in-out infinite;
}
.mf-ledger-spill .mf-arm {
  animation: mf-ledger-hug 1.8s ease-in-out infinite;
}

/* ── State: relay-delivering ──────────────────────────────────────────────── */

.mf-state-relay-delivering .mf-body {
  animation: mf-deliver-lean 1.6s ease-in-out infinite;
}
.mf-state-relay-delivering.mf-payload-note .mf-arm {
  animation: mf-note-offer 1.6s ease-in-out infinite;
}
.mf-state-relay-delivering.mf-payload-portrait .mf-arm {
  animation: mf-portrait-offer 1.6s ease-in-out infinite;
}
.mf-state-relay-delivering.mf-payload-ledger .mf-body {
  animation: mf-ledger-stagger 1.8s ease-in-out infinite;
}
.mf-state-relay-delivering.mf-payload-ledger .mf-arm {
  animation: mf-ledger-hug 1.8s ease-in-out infinite;
}

/* ── State: capture-framing ───────────────────────────────────────────────── */

.mf-state-capture-framing .mf-body {
  animation: mf-appraise-tilt 3s ease-in-out infinite alternate;
}
.mf-state-capture-framing .mf-arm {
  animation: mf-monocle-raise 900ms ease-out forwards;
}

/* ── State: relay-delivered-busy (extends relay-delivered visuals) ───────── */

.mf-state-relay-delivered-busy .mf-hat {
  animation: mf-tiphat-toward 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.mf-state-relay-delivered-busy .mf-body {
  animation: mf-lean-deliver 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.mf-state-relay-delivered-busy .mf-eyes {
  animation: mf-glance-aside 2.4s ease-in-out infinite;
}

/* ── State: fleet-unknown ─────────────────────────────────────────────────── */

.mf-state-fleet-unknown .mf-body {
  animation: mf-look-around 2.6s ease-in-out infinite;
}
.mf-state-fleet-unknown .mf-arm {
  animation: mf-watch-raise 900ms ease-out forwards;
}

/* ── State: fleet-0-blocked ────────────────────────────────────────────────── */

.mf-state-fleet-0-blocked .mf-body {
  animation: mf-breathe 3.8s ease-in-out infinite;
}
.mf-state-fleet-0-blocked .mf-eyes {
  animation: mf-blink 5s ease-in-out infinite;
}

/* ── State: fleet-1-blocked ───────────────────────────────────────────────── */

.mf-state-fleet-1-blocked .mf-body {
  animation: mf-alert-turn 700ms ease-out forwards;
}
.mf-state-fleet-1-blocked .mf-eyes {
  animation: mf-eyes-forward 700ms ease-out forwards;
}

/* ── State: fleet-2-3-blocked ─────────────────────────────────────────────── */
/* Static posture — folder held, no motion needed to read the count. */

/* ── State: fleet-4-plus-blocked ──────────────────────────────────────────── */

.mf-state-fleet-4-plus-blocked .mf-body {
  animation: mf-brace-shift 3.2s ease-in-out infinite;
}

/* ── Overlay card ─────────────────────────────────────────────────────────── */

.mf-overlay {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #F8F1E1;
  border: 1px solid #E0D4BC;
  border-radius: 12px;
  padding: 9px 14px;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22), 0 1px 4px rgba(0, 0, 0, 0.12);
  width: 280px;
  box-sizing: border-box;
  /* Prevent clicks propagating — Electron handles click-through at window level */
  pointer-events: none;
  user-select: none;
  -webkit-user-select: none;
  font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
}

.mf-overlay-avatar {
  flex: none;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mf-overlay-text {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: #2A241F;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mf-overlay-indicator {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Indicator: pulsing dot (listening) */
.mf-indicator-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #B8893C;
  animation: mf-pulse 1.4s ease-in-out infinite;
}

/* Indicator: waveform bars (recording) */
.mf-indicator-bars {
  width: 16px;
  height: 16px;
}
.mf-indicator-bars rect {
  transform-origin: bottom;
  transform-box: fill-box;
}
.mf-indicator-bars rect:nth-child(1) { animation: mf-bar 0.7s ease-in-out infinite; }
.mf-indicator-bars rect:nth-child(2) { animation: mf-bar 0.7s ease-in-out 0.2s infinite; }
.mf-indicator-bars rect:nth-child(3) { animation: mf-bar 0.7s ease-in-out 0.4s infinite; }

/* Indicator: spinner (processing) */
.mf-indicator-spinner {
  width: 13px;
  height: 13px;
  animation: mf-spin 0.9s linear infinite;
}

.mf-indicator-polishing {
  width: 14px;
  height: 14px;
}

/* Indicator: success check (done) */
.mf-indicator-check {
  width: 18px;
  height: 18px;
}

/* Indicator: warning (error) */
.mf-indicator-warn {
  width: 18px;
  height: 18px;
}

.mf-indicator-cancelled {
  width: 18px;
  height: 18px;
}

/* ── Reduced motion ───────────────────────────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
  /* Strip all mascot animations */
  .mf-body,
  .mf-hat,
  .mf-eyes,
  .mf-brows,
  .mf-moustache,
  .mf-cane,
  .mf-arm,
  .mf-figure,
  .mf-wave-1,
  .mf-wave-2,
  .mf-words-messy,
  .mf-words-clean,
  .mf-ding {
    animation: none !important;
  }

  /* Cancelled: just hide — no slide */
  .mf-state-cancelled .mf-figure {
    opacity: 0;
    transition: opacity 120ms ease;
  }

  /* Strip overlay indicators */
  .mf-indicator-dot,
  .mf-indicator-bars rect,
  .mf-indicator-spinner {
    animation: none !important;
  }

  .mf-indicator-dot {
    opacity: 0.6;
  }
}

.mf-brows-worried { display: none; }
.mf-state-error .mf-brows-normal { display: none; }
.mf-state-error .mf-brows-worried { display: inline; }
.mf-state-refused .mf-brows-normal { display: none; }
.mf-state-refused .mf-brows-worried { display: inline; }
.mf-state-capture-delivery-failed .mf-brows-normal { display: none; }
.mf-state-capture-delivery-failed .mf-brows-worried { display: inline; }
